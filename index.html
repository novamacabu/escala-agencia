<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a6c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Escala NMB">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
<title>Escala - Agência NMB</title>
<style>
:root{--bg:#0b0b10;--surface:#13131c;--card:#1a1a28;--border:#252535;--border2:#32324a;--text:#e8e4f0;--muted:#9590a8;--accent:#1a3a6c;--paid-light:#4caf7d;--pend-light:#e05555;--accent-light:#3a6aac;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,'Inter',Roboto,'Helvetica Neue',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
body.light{--bg:#fff;--surface:#f2f2f2;--card:#fff;--border:#d0d0d0;--border2:#a0a0a0;--text:#111;--muted:#555;--accent:#1a3a6c;--paid-light:#1e8449;--pend-light:#c0392b;--accent-light:#3a6aac;}
body.light,html:has(body.light){background:#fff!important;}
body.light .sync-banner{background:#f0f0f0;color:#333;border-bottom:1px solid #d0d0d0;}
body.light .sheet{background:#f0ede4;}
body.light .cell{background:#fff!important;border-color:#e0e0e0!important;box-shadow:0 1px 3px rgba(0,0,0,.06);}
body.light .cell.empty{background:#f5f5f5!important;}
body.light .cell.today{background:#edf2ff!important;border-color:var(--accent)!important;box-shadow:0 0 12px rgba(26,58,108,.1)!important;}
body.light .day-hdr{background:#f0f0f0!important;color:#333!important;}
body.light .day-hdr.dom{color:#c0392b!important;}
body.light .day-num{color:#333!important;}
body.light .action-btn{background:#fff;border-color:#ddd;color:#111;}
body.light .person-opt,body.light .shift-opt,body.light .pay-opt{background:#fff;border-color:#ddd;color:#333;}
body.light .shift-opt.sel-1T{border-color:#b8860b;background:#fffbef;color:#7a5200;}
body.light .shift-opt.sel-2T{border-color:#1a4a7a;background:#eff6ff;color:#1a4a7a;}
body.light .shift-opt.sel-TI{border-color:#6a1b9a;background:#f3e5f5;color:#6a1b9a;}
body.light .pay-opt.sel-paid{border-color:#1a7a4a;background:#f0fff4;color:#1a7a4a;}
body.light .pay-opt.sel-pend{border-color:#c0392b;background:#fff0f0;color:#c0392b;}
body.light .confirm-box{background:#fff;border-color:#d0d0d0;}
body.light .day-type-btn{background:#fff;border-color:#ddd;color:#333;}
body.light .day-type-btn.active{border-color:#1a3a6c;background:rgba(26,58,108,.08);color:#1a3a6c;}
body.light .time-fields{background:#f5f5f5;}
body.light .time-fields input[type=time]{background:#fff;border-color:#ddd;color:#333;}
body.light::after{display:none;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-banner{display:flex;align-items:center;gap:8px;padding:8px 18px;font-size:12px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
.sync-banner .sb-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);flex-shrink:0;}
.sync-banner.synced .sb-dot{background:var(--paid-light);box-shadow:0 0 6px var(--paid-light);}
.sync-banner.synced{color:var(--paid-light);}
.sync-banner.syncing .sb-dot{background:var(--accent);animation:pulse 1s infinite;}
.sync-banner.syncing{color:var(--accent);}
.sync-banner.error .sb-dot{background:var(--pend-light);}
.sync-banner.error{color:var(--pend-light);}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0;gap:8px;flex-wrap:wrap;position:sticky;top:0;z-index:500;background:var(--bg);}
.top-bar-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.tbtn{display:flex;align-items:center;gap:5px;font-family:inherit;font-size:12px;font-weight:700;letter-spacing:.8px;padding:7px 12px;border-radius:20px;cursor:pointer;user-select:none;border:1px solid;transition:transform .1s,box-shadow .12s;text-transform:uppercase;}.tbtn:active{transform:scale(.95);}
.tbtn-cfg{background:rgba(26,58,108,.18);border-color:rgba(26,58,108,.3);color:var(--text);}
.tbtn-share{background:rgba(26,58,108,.18);border-color:rgba(26,58,108,.3);color:var(--text);}
.cloud-badge{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--accent);background:rgba(26,58,108,.06);border:1px solid rgba(26,58,108,.15);border-radius:20px;padding:6px 12px;letter-spacing:.3px;}
.view-toggle{display:flex;gap:0;margin:12px 18px 0;border-radius:10px;overflow:hidden;border:1.5px solid var(--accent);}
.view-toggle-btn{flex:1;padding:10px 16px;text-align:center;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;user-select:none;border:none;background:transparent;color:var(--accent);}
.view-toggle-btn.active{background:var(--accent);color:#fff;}
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;padding:10px 18px;border-bottom:1px solid var(--border);align-items:center;position:sticky;top:46px;z-index:499;background:var(--bg);}
.filter-bar-label{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text);font-weight:700;}
.filter-chip{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-family:inherit;font-weight:700;cursor:pointer;border:1.5px solid transparent;user-select:none;opacity:.45;transition:opacity .15s,transform .1s;}
.filter-chip.active{opacity:1;transform:scale(1.05);}.filter-chip:active{transform:scale(.93);}
.hint{text-align:center;font-size:12px;letter-spacing:2px;color:var(--muted);padding:7px;text-transform:uppercase}
.cal-wrap{padding:0 8px 8px;overflow-x:auto}
.calendar{display:grid;grid-template-columns:repeat(7,minmax(116px,1fr));gap:3px;min-width:700px}
.day-hdr{background:var(--surface);text-align:center;padding:9px 4px;font-size:12px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;font-weight:700;}
.day-hdr.dom{color:#e57272;}
.cell{background:var(--card);min-height:120px;padding:8px 7px 6px;display:flex;flex-direction:column;gap:4px;position:relative;border:1.5px solid transparent;}
.cell.empty{background:var(--surface);opacity:.22;pointer-events:none;}
.cell.today{background:#0f1a2e;border-color:var(--accent);}
.cell.dom .day-num{color:#e57272!important;}
.cell.today .day-num,.cell.today .day-dow{color:var(--accent-light)!important;}
.cell.drag-over{box-shadow:inset 0 0 0 2px rgba(26,58,108,.4);}
.day-num{font-size:20px;font-weight:800;color:var(--muted);line-height:1;pointer-events:none;}
.day-dow{font-size:12px;color:var(--muted);opacity:.55;letter-spacing:.5px;pointer-events:none;text-transform:uppercase;margin-top:1px;}
.cell.dom .day-dow{color:#e57272;opacity:.75;}
.shift-divider{height:1px;background:var(--border);margin:2px 0;opacity:.5;}
.htag{font-size:12px;letter-spacing:.8px;text-transform:uppercase;color:#e57272;background:rgba(229,114,114,.1);border-radius:4px;padding:2px 6px;pointer-events:none;font-weight:700;}
.add-btn{margin-top:auto;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--border2);border:1px dashed var(--border2);border-radius:20px;padding:3px 0;text-align:center;cursor:pointer;user-select:none}
.add-btn:hover{color:var(--accent);border-color:var(--accent)}
.comment-bubble{display:flex;align-items:flex-start;gap:5px;background:rgba(26,58,108,.07);border:1px solid rgba(26,58,108,.18);border-radius:8px;padding:5px 7px;margin-top:1px;cursor:pointer;transition:background .12s;}.comment-bubble:hover{background:rgba(26,58,108,.1);}
.comment-bubble .cb-icon{font-size:12px;flex-shrink:0;opacity:.7;}
.comment-bubble .cb-text{font-size:13px;line-height:1.4;word-break:break-word;flex:1;color:var(--text);}
.comment-bubble .cb-edit{font-size:12px;color:var(--accent);opacity:0;}
.comment-bubble:hover .cb-edit{opacity:1;}
.add-comment-btn{font-size:12px;text-transform:uppercase;color:var(--muted);opacity:.65;cursor:pointer;padding:1px 0;user-select:none;display:flex;align-items:center;gap:3px;}
.add-comment-btn:hover{opacity:1;color:var(--accent);}
.badge{display:flex;align-items:center;gap:5px;padding:5px 9px 5px 5px;border-radius:30px;font-size:12px;font-weight:700;cursor:grab;user-select:none;border:2px solid transparent;touch-action:none;}
.badge:active{cursor:grabbing;transform:scale(.94);}
.badge.dragging{opacity:.35;transform:scale(.94)}
.badge.dimmed{opacity:.15;pointer-events:none;filter:grayscale(.5);}
.badge .av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.badge .bnm{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#ghost{position:fixed;pointer-events:none;z-index:9500;display:none;opacity:.95;border-radius:30px;padding:8px 16px;font-size:14px;font-weight:800;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4),0 0 0 2px rgba(26,58,108,.5);transition:none;}
.overlay{position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.72);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:#16162a;border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px 20px 36px;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.4,1);border-top:1px solid var(--border2);max-height:90vh;overflow-y:auto;}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:0 auto 18px}
.sheet-title{font-size:16px;font-weight:700;color:var(--accent);margin-bottom:16px;}
.sheet-day-label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.action-list{display:flex;flex-direction:column;gap:8px}
.action-btn{display:flex;align-items:center;gap:10px;padding:13px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:12px;cursor:pointer;user-select:none}
.action-btn .ico{font-size:16px;width:24px;text-align:center}
.action-btn.danger{color:#f57272}
.action-btn.success{color:var(--paid-light)}
.action-btn.warn{color:var(--pend-light)}
.action-btn.wa{color:#25d366}
.action-btn .sub{font-size:12px;color:var(--muted);display:block;margin-top:1px}
.form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.form-label{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.person-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.person-opt{padding:10px 8px;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--border);font-size:13px;font-weight:700;cursor:pointer;user-select:none;}
.shift-grid{display:flex;flex-direction:column;gap:8px}
.shift-opt{padding:10px 8px;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center;gap:6px}
.shift-opt.sel-1T{border-color:#b8860b;background:rgba(255,213,79,.15);color:#b8860b;}
.shift-opt.sel-2T{border-color:#1a4a7a;background:rgba(144,202,249,.15);color:#1a4a7a;}
.shift-opt.sel-TI{border-color:#6a1b9a;background:rgba(186,104,200,.15);color:#6a1b9a;}
.pay-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pay-opt{padding:10px 8px;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;user-select:none}
.pay-opt.sel-paid{border-color:var(--paid-light);background:rgba(46,125,82,.15);color:var(--paid-light)}
.pay-opt.sel-pend{border-color:var(--pend-light);background:rgba(224,85,85,.12);color:var(--pend-light)}
.confirm-btn{width:100%;padding:14px;border-radius:12px;background:var(--accent);color:#fff;font-size:14px;font-weight:800;border:none;cursor:pointer;margin-top:6px;}
.confirm-btn:disabled{opacity:.35;cursor:not-allowed}
.cancel-btn{width:100%;padding:12px;border-radius:12px;background:transparent;color:var(--muted);font-size:13px;font-weight:700;border:1px solid var(--border);cursor:pointer;margin-top:8px;}
.text-input{width:100%;padding:12px 14px;border-radius:10px;background:var(--card);border:1.5px solid var(--border2);color:var(--text);font-size:14px;font-weight:700;outline:none;}
.text-input:focus{border-color:var(--accent);}
select.text-input{cursor:pointer;}
.color-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:4px;}
.color-swatch{width:100%;aspect-ratio:1;border-radius:50%;cursor:pointer;border:3px solid transparent;}
.color-swatch.sel{border-color:#fff;transform:scale(1.15);}
.people-list{display:flex;flex-direction:column;gap:8px;}
.person-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:var(--card);border:1px solid var(--border);}
.person-row .pr-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.person-row .pr-ico{font-size:18px;cursor:pointer;padding:4px;color:var(--muted);}
.person-row .pr-del:hover{color:var(--pend-light)!important;}
.day-type-bar{display:flex;gap:8px;margin-bottom:12px;}
.day-type-btn{flex:1;padding:10px 8px;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--border);font-size:12px;font-weight:700;cursor:pointer;user-select:none;}
.day-type-btn.active{border-color:var(--accent);background:rgba(26,58,108,.15);color:var(--accent);}
.time-fields{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px;padding:12px;background:var(--surface);border-radius:10px;border:1px solid var(--border);}
.time-fields label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.time-fields input[type=time]{width:100%;padding:8px;border-radius:8px;background:var(--card);border:1px solid var(--border2);color:var(--text);font-size:13px;font-weight:700;}
.reg-shift-card{padding:10px 12px;border-radius:10px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px;font-size:12px;}
.reg-shift-card b{display:block;margin-bottom:2px;}
.reg-shift-card span{color:var(--muted);font-size:12px;}
.ponto-wrap{overflow-x:auto;padding:0 8px 8px;}
.gantt{min-width:800px;border:1px solid var(--border);border-radius:8px;}
.gantt-scroll{overflow-x:auto;padding:0 8px 8px;-webkit-overflow-scrolling:touch;}
.gantt-fixed-hdr{position:fixed;top:62px;left:0;right:0;z-index:200;display:none;padding:0 8px;pointer-events:none;}
.gantt-fixed-hdr .gantt-row{pointer-events:auto;box-shadow:0 2px 6px rgba(0,0,0,.15);}
.gantt-row{display:flex;border-bottom:1px solid var(--border);}
.gantt-row:last-child{border-bottom:none;}
.gantt-row.header{background:var(--surface);}
.gantt-row.header>div{padding:8px 0;font-size:12px;font-weight:700;color:var(--muted);text-align:center;border-right:1px solid var(--border);}
.gantt-ncol{width:130px;min-width:130px;padding:8px 10px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;border-right:1px solid var(--border);flex-shrink:0;background:var(--card);text-align:center;}
.gantt-day-group{display:flex;border-bottom:1px solid var(--border);}
.gantt-day-group.drag-over-day{background:rgba(26,58,108,.12)!important;outline:3px solid #1a3a6c;outline-offset:-1px;position:relative;z-index:50;}
.gantt-day-date{width:130px;min-width:130px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;border-right:1px solid var(--border);background:var(--card);text-align:center;flex-shrink:0;}
.gantt-day-content{flex:1;display:flex;flex-direction:column;}
.gantt-pline{position:relative;height:40px;background:var(--card);}
.gantt-pline+.gantt-pline{border-top:none;}
.gantt-tcol{flex:1;position:relative;height:40px;background:var(--card);}
.gantt-bar{position:absolute;top:5px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.12);z-index:1;border-right:3px solid transparent;-webkit-background-clip:padding-box;background-clip:padding-box;}
.gantt-bar.brk{opacity:1;z-index:0;font-size:8px;letter-spacing:0;padding:0 1px;color:var(--muted);font-weight:700;}
.gantt-hline{position:absolute;top:0;bottom:0;width:1px;background:var(--border);opacity:.3;}
.gantt-now{position:absolute;top:0;bottom:0;width:2px;background:#e05555;z-index:3;box-shadow:0 0 6px rgba(224,85,85,.4);}
.gantt-row.cov .gantt-ncol{font-size:12px;color:var(--muted);background:var(--surface);}
.gantt-row.cov .gantt-tcol{background:var(--surface);height:32px;}
.cov-seg{position:absolute;top:0;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;border-right:1px solid var(--border);}
.cov-0{background:rgba(224,85,85,.15);color:#e05555;}
.cov-1{background:rgba(255,193,7,.12);color:#b8860b;}
.cov-2{background:rgba(76,175,125,.1);color:#4caf7d;}
.cov-3{background:rgba(76,175,125,.18);color:#2e7d52;}
.confirm-overlay{position:fixed;inset:0;z-index:9200;background:rgba(0,0,0,.78);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;padding:24px;}
.confirm-overlay.open{opacity:1;pointer-events:all;}
.confirm-box{background:var(--card);border-radius:18px;padding:28px 24px 20px;width:100%;max-width:360px;border:1px solid var(--border2);text-align:center;}
.confirm-box .cb-title{font-size:15px;font-weight:800;margin-bottom:6px;}
.confirm-box .cb-sub{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.confirm-box .cb-sub b{color:var(--accent);}
.cb-btns{display:flex;gap:10px;}
.cb-btns button{flex:1;padding:12px;border-radius:12px;font-size:13px;font-weight:800;border:none;cursor:pointer;}
.cb-btns .cb-yes{background:var(--accent);color:#fff;}
.cb-btns .cb-no{background:var(--card);color:var(--muted);border:1px solid var(--border);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--border2);color:var(--text);padding:9px 18px;border-radius:30px;font-size:12px;z-index:10100;transition:transform .3s ease;pointer-events:none;border:1px solid var(--border);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}
footer{text-align:center;font-size:12px;letter-spacing:2px;color:var(--muted);padding:10px 10px 20px;text-transform:uppercase;opacity:.4}

.login-screen{position:fixed;inset:0;z-index:10000;background:linear-gradient(135deg,#f8f9fa 0%,#e8eef5 50%,#f0f4f9 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .4s,transform .4s;}
.login-screen.hidden{opacity:0;transform:scale(1.05);pointer-events:none;}
.login-logo{width:220px;margin-bottom:32px;animation:logoFade 1s ease-out;}
.login-card{background:#fff;border-radius:20px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(26,58,108,.12),0 2px 8px rgba(0,0,0,.06);border:1px solid rgba(26,58,108,.08);text-align:center;}
.login-card h2{font-size:18px;font-weight:800;color:#1a3a6c;margin-bottom:6px;letter-spacing:.5px;}
.login-card .login-sub{font-size:13px;color:#888;margin-bottom:24px;}
.login-input{width:100%;padding:14px 16px;border-radius:12px;border:2px solid #e0e0e0;font-size:15px;font-weight:700;outline:none;font-family:inherit;transition:border-color .2s;background:#fafafa;color:#333;text-align:center;letter-spacing:1px;}
.login-input:focus{border-color:#1a3a6c;background:#fff;}
.login-input::placeholder{font-weight:400;letter-spacing:0;color:#bbb;}
.login-btn{width:100%;padding:14px;border-radius:12px;background:linear-gradient(135deg,#1a3a6c,#2a5a9c);color:#fff;font-size:15px;font-weight:800;border:none;cursor:pointer;margin-top:16px;font-family:inherit;letter-spacing:.5px;transition:transform .1s,box-shadow .2s;box-shadow:0 4px 12px rgba(26,58,108,.25);}
.login-btn:hover{box-shadow:0 6px 20px rgba(26,58,108,.35);}
.login-btn:active{transform:scale(.97);}
.login-hint{margin-top:20px;padding:12px 16px;background:rgba(26,58,108,.04);border-radius:10px;border:1px solid rgba(26,58,108,.08);}
.login-hint .lh-title{font-size:12px;color:#1a3a6c;font-weight:700;margin-bottom:4px;}
.login-hint .lh-text{font-size:12px;color:#666;line-height:1.5;}
.login-hint .lh-ex{font-size:12px;color:#999;font-style:italic;margin-top:4px;}
.login-forgot{margin-top:12px;font-size:13px;color:#1a3a6c;cursor:pointer;font-weight:700;opacity:.7;transition:opacity .15s;}
.login-forgot:hover{opacity:1;}
.login-footer{margin-top:24px;font-size:12px;color:#bbb;letter-spacing:1px;}
@keyframes logoFade{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}

/* MODERN INTERACTIONS */
::-webkit-scrollbar{height:8px;width:8px}
::-webkit-scrollbar-thumb{background:#c5cbd6;border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:#a8b2c2}
::-webkit-scrollbar-track{background:transparent}
.cell{transition:box-shadow .18s ease,transform .18s ease,border-color .18s ease;}
body.light .cell:hover:not(.empty){box-shadow:0 4px 16px rgba(26,58,108,.12)!important;transform:translateY(-1px);border-color:rgba(26,58,108,.25)!important;}
.cell.conflict{border-color:#e05555!important;box-shadow:inset 3px 0 0 #e05555;}
.badge{transition:transform .15s ease,box-shadow .15s ease;}
.badge:hover{transform:scale(1.04);box-shadow:0 2px 8px rgba(0,0,0,.15);}
.tbtn{transition:transform .12s ease,box-shadow .15s ease,background .15s ease;}
.tbtn:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(26,58,108,.18);}
.filter-chip{transition:opacity .15s,transform .12s,box-shadow .15s;}
.filter-chip:hover{opacity:.85;box-shadow:0 2px 6px rgba(0,0,0,.1);}
.action-btn{transition:border-color .15s,transform .12s,background .15s;}
.action-btn:hover{border-color:var(--accent);transform:translateX(3px);background:rgba(26,58,108,.03);}
.confirm-btn{transition:transform .12s,box-shadow .18s,filter .15s;}
.confirm-btn:hover:not(:disabled){box-shadow:0 4px 14px rgba(26,58,108,.3);filter:brightness(1.05);}
.confirm-btn:active{transform:scale(.98);}
.cancel-btn{transition:border-color .15s,color .15s;}
.cancel-btn:hover{border-color:var(--accent);color:var(--accent);}
.gantt-bar{transition:filter .12s,box-shadow .15s;}
.gantt-bar:hover{filter:brightness(1.08);box-shadow:0 2px 10px rgba(0,0,0,.28);z-index:5;}
.person-opt,.shift-opt,.pay-opt{transition:transform .12s,border-color .15s,background .15s;}
.person-opt:hover,.shift-opt:hover,.pay-opt:hover{transform:scale(1.02);border-color:var(--accent);}
.text-input{transition:border-color .18s,box-shadow .18s;}
.text-input:focus{box-shadow:0 0 0 3px rgba(26,58,108,.1);}
.sheet{box-shadow:0 -8px 40px rgba(0,0,0,.25);}
body.light .gantt-pline:hover{background:#f5f8fc;}
.pr-ico{transition:transform .12s,color .15s;}
.pr-ico:hover{transform:scale(1.2);}
.color-swatch{transition:transform .12s,border-color .15s;}
.color-swatch:hover{transform:scale(1.12);}
#toast{box-shadow:0 4px 20px rgba(0,0,0,.25);border-left:3px solid var(--accent);}
.month-block{animation:monthFade .3s ease-out;}
@keyframes monthFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
/* EXECUTIVE POLISH */
.calendar,.cal-wrap,.gantt,.gantt-scroll{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;}
.confirm-overlay,.confirm-box{-webkit-user-select:none;user-select:none;}
::selection{background:rgba(26,58,108,.18);}
html{scroll-behavior:smooth;}
.cell{border-radius:8px;}
.cell.empty{border-radius:8px;}
.day-hdr{border-radius:6px;letter-spacing:2.5px;}
.confirm-btn{background:linear-gradient(135deg,#1a3a6c,#2a5a9c);}
.gantt{border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(26,58,108,.06);}
.sheet{border-radius:24px 24px 0 0;}
.cloud-badge{box-shadow:0 1px 4px rgba(26,58,108,.10);font-weight:800;}
.calendar{gap:4px;}
.htag{letter-spacing:1px;border-radius:6px;}
footer{letter-spacing:3px;}
.login-logo{filter:drop-shadow(0 6px 16px rgba(26,58,108,.15));}
.sync-banner{font-weight:700;letter-spacing:2px;}
.filter-chip{font-weight:800;}
.gantt-day-date{letter-spacing:.5px;}
.confirm-box{box-shadow:0 12px 48px rgba(0,0,0,.35);}
.person-row{transition:border-color .15s,box-shadow .15s;}
.person-row:hover{border-color:rgba(26,58,108,.3);box-shadow:0 2px 8px rgba(26,58,108,.08);}
.reg-shift-card{transition:border-color .15s;}
input[type=time]{cursor:pointer;}
@media print{.login-screen{display:none!important;}
body::after,.top-bar,.hint,.overlay,.confirm-overlay,#ghost,#toast,footer,.add-btn,.sync-banner,.filter-bar,.view-toggle{display:none!important;}.calendar{min-width:unset;gap:1px;grid-template-columns:repeat(7,1fr);}.cell{min-height:52px;padding:3px;}.badge{padding:2px 4px;font-size:12px;}.badge .av{width:13px;height:13px;font-size:12px;}}
</style>
</head>

<script>
const BIN_ID='6a5e182df5f4af5e29a79421';
const BIN_URL=`https://api.jsonbin.io/v3/b/${BIN_ID}`;
const MASTER_KEY='$2a$10$0X6cKUW1vKbnSySfMk0jeuteJ3vYiy4n7ZbLYRbjn4z7yduuz9KXa';
const ADMIN_ACCOUNTS=[{matricula:'admin',hash:'15438e5c55d247dc5e3e072d460035eacc1d5443133b3ff5f4a8198040dbb347',name:'Admin'},{matricula:'ricardo',hash:'2339716e3c67f72f48ff651d373c0376755c65b705ab71232c16b896bb69cb1c',name:'Ricardo'},{matricula:'clicia',hash:'bcc7d90e66521b697e0f277edd4a4a5781d937afa34dae824001d5528d3b2a4a',name:'Clicia'}];
function isPrincipal(){return ADMIN_ACCOUNTS.some(function(a){return sessionStorage.getItem('escala_admin')===a.hash;});}
function pruneAdminButtons(){if(isPrincipal())return;document.querySelectorAll('#top-bar-right .tbtn').forEach(function(b){var oc=b.getAttribute('onclick')||'';if(oc.indexOf('openHistorico')>-1)b.style.display='none';});}
async function sha256Hex(str){var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');}
const SID=Math.random().toString(36).substring(2,10);
var loggedUser=sessionStorage.getItem('escala_user')||null;
var loggedRole=sessionStorage.getItem('escala_role')||null;
let READ_ONLY=loggedRole!=='admin';
var _lockInterval=null,_inactivityTimer=null;
function getEmployeePass(p){if(!p.cpf)return null;var clean=p.cpf.replace(/\D/g,'');if(clean.length<4)return null;var firstName=p.name.split(' ')[0];var formatted=firstName.charAt(0).toUpperCase()+firstName.slice(1).toLowerCase();return formatted+clean.slice(-4);}
async function checkLogin(pwd){var h=await sha256Hex(pwd);var admMatch=ADMIN_ACCOUNTS.find(function(a){return h===a.hash;});if(admMatch)return{role:'admin',name:admMatch.name};for(var i=0;i<people.length;i++){var p=people[i];if(p.customPass){var ok=false;if(/^[0-9a-f]{64}$/.test(p.customPass)){ok=(h===p.customPass);}else{ok=(pwd===p.customPass);if(ok){p.customPass=h;}}if(ok)return{role:p.isAdmin?'admin':'employee',name:p.name};continue;}var ep=getEmployeePass(p);if(ep&&pwd===ep)return{role:p.isAdmin?'admin':'employee',name:p.name};}return null;}
async function acquireLock(){try{var r=await fetch(BIN_URL+'/latest',{headers:{'X-Bin-Meta':'false','X-Master-Key':MASTER_KEY}});if(!r.ok)return true;var p=await r.json();var lock=p.adminLock;var now=Date.now();if(lock&&lock.sid!==SID&&(now-lock.since)<300000){showLockBanner(lock.name||'outro admin',Math.ceil((300000-(now-lock.since))/60000));return false;}return true;}catch(e){return true;}}
